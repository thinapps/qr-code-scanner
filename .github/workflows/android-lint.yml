name: Run Android Lint

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint:
    name: Lint Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools

      - name: Point ANDROID_HOME at SDK root
        run: echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Install Android SDK platform + build-tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "build-tools;35.0.0" \
            "platforms;android-35"

      - name: Clean any leftover wrapper jar
        run: rm -f gradle/wrapper/gradle-wrapper.jar

      - name: Download Gradle 8.9
        run: |
          set -euo pipefail
          curl --fail --location --show-error --silent \
            https://services.gradle.org/distributions/gradle-8.9-bin.zip \
            -o gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Provide lint-only signing placeholders
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.gradle"
          {
            echo "RELEASE_STORE_FILE=$RUNNER_TEMP/lint-placeholder.jks"
            echo "RELEASE_STORE_PASSWORD=lint"
            echo "RELEASE_KEY_ALIAS=lint"
            echo "RELEASE_KEY_PASSWORD=lint"
          } > "$HOME/.gradle/gradle.properties"
          touch "$RUNNER_TEMP/lint-placeholder.jks"

      - name: Run release lint
        run: ./gradlew --no-daemon --stacktrace --info lintRelease

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: app/build/reports/lint-results-release.*
          if-no-files-found: warn
