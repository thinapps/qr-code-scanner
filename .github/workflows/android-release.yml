name: Build Android Release

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write Gradle signing properties
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.gradle" "$HOME/keystore"
          {
            echo "RELEASE_STORE_FILE=$HOME/keystore/upload-key.jks"
            echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}"
            echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}"
            echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}"
          } > "$HOME/.gradle/gradle.properties"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Point ANDROID_HOME at SDK root
        run: echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Install Android SDK platform + build-tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "cmdline-tools;latest" \
            "build-tools;35.0.0" \
            "platforms;android-35"

      - name: Clean any leftover wrapper jar
        run: rm -f gradle/wrapper/gradle-wrapper.jar

      - name: Download Gradle 8.9
        run: |
          set -euo pipefail
          curl --fail --location --show-error --silent \
            https://services.gradle.org/distributions/gradle-8.9-bin.zip \
            -o gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Restore keystore from secret
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > "$HOME/keystore/upload-key.jks"

      - name: Build signed Release bundle
        run: ./gradlew --no-daemon --stacktrace --info clean bundleRelease

      - name: Name release bundle
        run: |
          set -euo pipefail
          VERSION_NAME=$(grep -m1 'versionName' app/build.gradle | sed -E 's/.*"([^"]+)".*/\1/')
          AAB_BASENAME="qr-code-scanner-${VERSION_NAME}-release"
          AAB_FILE="${AAB_BASENAME}.aab"
          cp app/build/outputs/bundle/release/app-release.aab "$AAB_FILE"
          echo "AAB_BASENAME=$AAB_BASENAME" >> "$GITHUB_ENV"
          echo "AAB_FILE=$AAB_FILE" >> "$GITHUB_ENV"

      - name: Verify AAB signature
        run: jarsigner -verify "$AAB_FILE"

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-and-kotlin-logs
          path: |
            **/build/reports/**
            **/build/tmp/kotlin-compile*/**
            ~/.gradle/daemon/*/daemon-*.out.log
            ~/.gradle/caches/**/kotlin/**
            ./**/build/outputs/logs/**
            ./**/build/*/reports/**

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.AAB_BASENAME }}
          path: ${{ env.AAB_FILE }}
